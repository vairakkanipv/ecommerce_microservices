version: '3.8'

services:

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"      # apps connect here
      - "15672:15672"    # browser dashboard → http://localhost:15672

  product-service:
    build: ./product_service
    ports:
      - "8001:8001"
    depends_on:
      - rabbitmq

  order-service:
    build: ./order_service
    ports:
      - "8002:8002"
    depends_on:
      - rabbitmq
      - product-service